<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <script src="./scripts.js" defer></script>
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="background">
            <div class="headin_1"> 
                <h1>Counter</h1>
                <div class="some_info">
                    <p>This is a simple counter application built with HTML, CSS, and JavaScript. You can increment or decrement the counter value using the buttons below.</p>
                </div>
            </div>
            <div class="counter_container">
                <p id="counter_value">0</p>
                <button id="increment_button" onclick=increment()>Increment</button>
                <button id="decrement_button" onclick=decrement()>Decrement</button>
            </div>
        </div>
    </div>
</body>
</html>
