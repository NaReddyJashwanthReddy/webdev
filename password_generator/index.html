<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <script src="script.js" defer></script>
    <title>Password Generator</title>
</head>
<body>
    <div class="heading">
        <h1>Generate <br>Random Passwords</h1>
    </div>
    <div class="sub">
        <p>Click the button below to generate a random password.</p>
    </div>
    <div class="length-of-password">
        <label for="passwordLength">Password Length:</label>
        <input type="number" id="passwordLength" min="6" max="30" value="15">
    </div>
    <div class="include-char">
        <label for="charType">Character Type:</label>
        <select id="charType">
            <option value="all">All (Letters, Numbers, Symbols)</option>
            <option value="alphanumeric">Alphanumeric (Letters & Numbers)</option>
            <option value="letters">Letters Only</option>
            <option value="numbers">Numbers Only</option>
            <option value="symbols">Symbols Only</option>
            <option value="lettersNumbers">Letters & Numbers</option>
            <option value="lettersSymbols">Letters & Symbols</option>
        </select>
    </div>
    <div class="button-generate">
        <button type="button" class="generate-btn" id="generateBtn">Generate Password</button>
    </div>
    <div class="generated">
        <p id="password1"></p>
        <p id="password2"></p>
    </div>
</body>
</html>
